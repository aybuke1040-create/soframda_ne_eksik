name: soframda_ne_eksik
description: Soframda Ne Eksik App

publish_to: "none"

version: 1.0.21+23

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  firebase_core: ^2.27.0
  cloud_firestore: ^4.17.0
  cloud_functions: ^4.7.6
  firebase_storage: ^11.7.0
  firebase_auth: ^4.15.0
  firebase_messaging: ^14.7.0

  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0
  image_picker: ^1.0.7
  image_cropper: ^8.0.2
  geocoding: ^2.1.1
  latlong2: ^0.9.0
  geoflutterfire2: ^2.3.15
  geoflutterfire_plus: ^0.0.5
  flutter_image_compress: ^2.1.0
  flutter_local_notifications: ^17.1.2
  in_app_purchase: ^3.1.13
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  path_provider_foundation: 2.5.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/ben_yaparim_logo.png
    - assets/images/food_placeholder.png
    - assets/images/foods/
    - assets/images/request_ideas/

flutter_launcher_icons:
  image_path: "assets/images/ben_yaparim_logo.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21

