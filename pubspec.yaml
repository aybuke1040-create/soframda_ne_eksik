name: soframda_ne_eksik
description: Soframda Ne Eksik App

publish_to: "none"

version: 1.0.49+62

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  firebase_core: ^4.12.1
  cloud_firestore: ^6.7.1
  cloud_functions: ^6.3.5
  firebase_storage: ^13.4.5
  firebase_auth: ^6.5.6
  firebase_messaging: ^16.4.3

  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0
  image_picker: ^1.0.7
  image_cropper: ^8.0.2
  geocoding: ^2.1.1
  latlong2: ^0.9.0
  geoflutterfire_plus: ^0.0.34
  flutter_image_compress: ^2.1.0
  flutter_local_notifications: ^17.1.2
  in_app_purchase: ^3.1.13
  in_app_purchase_android: ^0.4.0+8
  package_info_plus: ^8.0.2
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  google_sign_in: ^7.2.0
  google_mobile_ads: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  path_provider_foundation: 2.5.1

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true

  assets:
    - assets/images/ben_yaparim_logo.png
    - assets/images/food_placeholder.png
    - assets/images/foods/
    - assets/images/request_ideas/

flutter_launcher_icons:
  image_path: "assets/images/ben_yaparim_logo.png"
  android: true
  ios: true
  adaptive_icon_background: "#632B91"
  adaptive_icon_foreground: "assets/images/ben_yaparim_logo_foreground.png"
  remove_alpha_ios: true
  min_sdk_android: 21

