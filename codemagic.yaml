workflows:
  ios-testflight:
    name: Ben Yaparim iOS TestFlight
    instance_type: mac_mini_m1
    max_build_duration: 60

    integrations:
      app_store_connect: codemagic-app-store-connect

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.benyaparim.app
      vars:
        BUNDLE_ID: "com.benyaparim.app"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
          cd ..

      - name: Patch gRPC for Xcode 16
        script: |
          ruby - <<'RUBY'
          file = File.join(Dir.pwd, 'ios', 'Pods', 'gRPC-Core', 'src', 'core', 'lib', 'promise', 'detail', 'basic_seq.h')
          abort("gRPC basic_seq.h not found at #{file}") unless File.exist?(file)

          contents = File.read(file)
          patched = contents.gsub(/Traits::template\s+CallSeqFactory/, 'Traits::CallSeqFactory')

          if contents == patched
            puts 'No gRPC patch change was needed'
          else
            File.write(file, patched)
            puts 'Patched gRPC basic_seq.h for Xcode 16 compatibility'
          end
          RUBY

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          flutter build ipa \
            --release \
            --build-number=$CM_BUILD_ID

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - destek@benyaparimci.com
